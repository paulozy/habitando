  <text x="640" y="660" font-family="serif" font-size="22" fill="#ffffff" text-anchor="middle">Demonstração em breve</text>
  <text x="640" y="685" font-family="ui-monospace, monospace" font-size="11" fill="#8fa3b8" text-anchor="middle" letter-spacing="2">HABITANDO.APP</text>
