    <!-- Reference line -->
    <line x1="40" y1="100" x2="900" y2="100" stroke="#b45309" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="900" y="98" font-family="ui-monospace, monospace" font-size="10" fill="#b45309" text-anchor="end">Disponível R$ 9.580</text>
  </g>

  <!-- Play hint overlay -->
