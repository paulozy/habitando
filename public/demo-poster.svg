      <rect x="240" y="-115" width="22" height="115" fill="#1a56db"/>
      <rect x="270" y="-120" width="22" height="120" fill="#1a56db"/>
      <rect x="300" y="-128" width="22" height="128" fill="#1a56db"/>
      <rect x="330" y="-132" width="22" height="132" fill="#1a56db"/>
      <rect x="360" y="-136" width="22" height="136" fill="#1a56db"/>
      <rect x="390" y="-140" width="22" height="140" fill="#1a56db"/>
      <rect x="420" y="-145" width="22" height="145" fill="#1a56db"/>
      <rect x="450" y="-148" width="22" height="148" fill="#1a56db"/>
      <rect x="480" y="-152" width="22" height="152" fill="#1a56db"/>
      <rect x="510" y="-155" width="22" height="155" fill="#1a56db"/>
      <rect x="540" y="-160" width="22" height="160" fill="#1a56db"/>
      <rect x="570" y="-180" width="22" height="180" fill="#f59e0b"/>
      <rect x="600" y="-165" width="22" height="165" fill="#1a56db"/>
      <rect x="630" y="-168" width="22" height="168" fill="#1a56db"/>
      <rect x="660" y="-170" width="22" height="170" fill="#1a56db"/>
      <rect x="690" y="-172" width="22" height="172" fill="#1a56db"/>
      <rect x="720" y="-175" width="22" height="175" fill="#1a56db"/>
      <rect x="750" y="-178" width="22" height="178" fill="#1a56db"/>
      <rect x="780" y="-180" width="22" height="180" fill="#1a56db"/>
      <rect x="810" y="-185" width="22" height="185" fill="#1a56db"/>
      <rect x="840" y="-200" width="22" height="200" fill="#f59e0b"/>
      <rect x="870" y="-188" width="22" height="188" fill="#1a56db"/>
