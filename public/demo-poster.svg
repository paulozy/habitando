<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </linearGradient>
    <radialGradient id="accent" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#c9973a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c9973a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="green" cx="20%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#0d7a4e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0d7a4e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#accent)"/>
  <rect width="1280" height="720" fill="url(#green)"/>

  <!-- Mock dashboard frame -->
  <rect x="120" y="100" width="1040" height="520" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>

  <!-- Header bar -->
  <rect x="120" y="100" width="1040" height="56" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <circle cx="160" cy="128" r="6" fill="#ff5f56"/>
  <circle cx="184" cy="128" r="6" fill="#ffbd2e"/>
  <circle cx="208" cy="128" r="6" fill="#27c93f"/>
  <text x="640" y="134" font-family="ui-monospace, monospace" font-size="13" fill="#8fa3b8" text-anchor="middle" letter-spacing="2">HABITANDO · DEMO</text>

  <!-- Stat cards row -->
  <g transform="translate(160, 200)">
    <rect width="220" height="92" rx="10" fill="#ffffff" fill-opacity="0.06"/>
    <text x="20" y="32" font-family="ui-monospace, monospace" font-size="10" fill="#8fa3b8" letter-spacing="1.5">TOTAL GERAL</text>
    <text x="20" y="68" font-family="serif" font-size="24" fill="#ffffff" font-style="italic">R$ 281.230</text>
    <rect width="220" height="3" fill="#1a56db"/>
  </g>
  <g transform="translate(400, 200)">
    <rect width="220" height="92" rx="10" fill="#ffffff" fill-opacity="0.06"/>
    <text x="20" y="32" font-family="ui-monospace, monospace" font-size="10" fill="#8fa3b8" letter-spacing="1.5">SALDO FINAL</text>
    <text x="20" y="68" font-family="serif" font-size="24" fill="#ffffff" font-style="italic">R$ 338.000</text>
    <rect width="220" height="3" fill="#0d7a4e"/>
  </g>
  <g transform="translate(640, 200)">
    <rect width="220" height="92" rx="10" fill="#ffffff" fill-opacity="0.06"/>
    <text x="20" y="32" font-family="ui-monospace, monospace" font-size="10" fill="#8fa3b8" letter-spacing="1.5">INCC TOTAL</text>
    <text x="20" y="68" font-family="serif" font-size="24" fill="#c9973a" font-style="italic">R$ 94.463</text>
    <rect width="220" height="3" fill="#7c3aed"/>
  </g>
  <g transform="translate(880, 200)">
